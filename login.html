<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="estilos/style-login.css">
</head>
<body>

  <video class="video-background" autoplay muted loop playsinline>
    <source src="videos/login-fondo.mp4" type="video/mp4">
  </video>

  <div class="login-container">
    <div class="login-box">
      <div class="logo-login">
        <a href="index.html"><img src="imagenes\logo.png" alt="Logo-login"></a>
      </div>
      <form action="#" method="post">
        <input type="email" class="input-field" placeholder="📧 Correo" required>
        <input type="password" class="input-field" placeholder="🔒 Contraseña" required>
        <button type="submit" class="login-button">Iniciar Sesión</button>
      </form>
    </div>
  </div>

</body>
</html>
